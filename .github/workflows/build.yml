name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app,dmg
            exe_suffix: ""
          - os: windows-latest
            bundles: nsis
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run check

      - name: Prepare pack placeholders
        shell: bash
        run: |
          mkdir -p src-tauri/target/release
          touch "src-tauri/target/release/streamverse-pack-douyin${{ matrix.exe_suffix }}"
          touch "src-tauri/target/release/streamverse-pack-bilibili${{ matrix.exe_suffix }}"
          touch "src-tauri/target/release/streamverse-pack-youtube${{ matrix.exe_suffix }}"

      - name: Build pack binaries
        run: cargo build --release --bin streamverse-pack-douyin --bin streamverse-pack-bilibili --bin streamverse-pack-youtube
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build desktop bundle
        run: npm run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: streamverse-${{ matrix.os }}-${{ matrix.bundles }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  publish-release:
    name: publish-desktop-release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamverse-*
          merge-multiple: true

      - name: Publish desktop release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          fail_on_unmatched_files: true
